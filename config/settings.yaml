model:
  score_weights:
    geology: 0.20
    discovery_probability: 0.15
    scale_potential: 0.15
    management: 0.10
    jurisdiction: 0.10
    catalysts: 0.10
    capital_structure: 0.05
    market_positioning: 0.05
    strategic_value: 0.05
    esg_permitting: 0.05

  ev_model:
    catalyst_multipliers:
      near_term: 1.2
      mid_term: 1.0
      long_term: 0.8
    probability_range:
      min: 0.25
      max: 0.80
    upside_range:
      min: 5
      max: 50

  ev_scaling:
    core: 5.0
    core_min: 4.0
    secondary: 3.0

  risk_thresholds:
    sell_candidate: 9
    swap_trigger: 9
    weak_holding: 7

  position_size:
    core_min: 0.06
    core_max: 0.10
    secondary_min: 0.03
    secondary_max: 0.06
    speculative_min: 0.01
    speculative_max: 0.03

  decision:
    buy_score_min: 8.4
    buy_ev_min: 4.5
    add_ev_min: 5.0
    hold_score_min: 7.0
    sell_risk_min: 9

  portfolio_constraints:
    core_target: 0.60
    rising_target: 0.40
    max_single_position: 0.25
    max_region_exposure: 0.45
    max_commodity_exposure: 0.30

  rebalance:
    overweight_deviation: 0.20
    swap_ev_multiplier: 1.25
    min_ev_improvement: 1.0

paths:
  raw_data: data/raw
  processed_data: data/processed
  output_reports: reports
  database: data/processed/scoring_data.db

data:
  primary_currency: USD

pdf:
  font: Helvetica
  accent_color: "#355070"
  version: "V7 MVP"

theme:
  dusk_blue: "#355070"
  dusty_lavender: "#6d597a"
  sage_green: "#6b8f71"
  rosewood: "#b56576"
  light_coral: "#e56b6f"
  light_bronze: "#eaac8b"

rubrics_file: config/scoring_rubrics.yaml
